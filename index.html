<!DOCTYPE html>
<html lang="en" style="background:#0a100e;color-scheme:dark">
<head>
<meta charset="UTF-8">
<!-- NO interactive-widget=resizes-content: that asks the browser to shrink the
     LAYOUT viewport for the keyboard, which double-counts against the --kb the
     app measures itself (shell shrinks AND the sheet subtracts the keyboard
     again = a 170px sliver of panel with a dead gap under it). We keep the
     classic resizes-visual model on every platform and handle the keyboard once. -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Flips — Resale Tracker</title>
<meta name="description" content="Track what you buy, what you sell, and what you pocket.">
<meta name="theme-color" content="#0a100e">
<meta name="format-detection" content="telephone=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flips">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="icons/favicon-48.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<style>
:root{
  --sab:env(safe-area-inset-bottom,0px);
  --bg:#0a100e; --bg2:#0d1512;
  --card:rgba(255,255,255,.045); --card2:rgba(255,255,255,.03);
  --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.05);
  --txt:#eef7f3; --sub:#93a8a0; --faint:#5f7169;
  --em:#34d399; --em2:#10b981; --teal:#2dd4bf; --emdk:#0d9488;
  --pos:#34d399; --neg:#fb7185; --amber:#fbbf24;
  --grad:linear-gradient(135deg,#34d399,#0d9488);
  --r-lg:20px; --r-md:16px; --r-sm:12px;
  --tabh:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
/* The DOCUMENT must never scroll. --vvh is a measurement and can land a little
   taller than the real webview (the screen.height snap); if <html> is allowed to
   scroll, that overflow lets iOS's keyboard pan shift the entire shell upward —
   the sheet header slides under the status bar and stays there. Clamping here
   means a pan has nowhere to go. Only #view and .sheet-body ever scroll.
   It must be `clip`, NOT `hidden`: hidden is still scrollable programmatically,
   and iOS's keyboard pan is exactly that kind of scroll. clip cannot move. */
html{height:100%;overflow:clip;overscroll-behavior:none}
/* App-shell layout: the BODY never scrolls — #view scrolls internally and the
   tab bar is a normal flex row. No position:fixed nav, so iOS standalone can't
   mis-place it on first paint (the "buttons only work after they jump" bug). */
/* NO viewport units for the shell height — iOS standalone mis-computes
   dvh/vh (reserves phantom Safari-chrome space). --vvh is measured from
   visualViewport by the inline script below and tracks rotation/resize. */
body{
  /* overflow:CLIP, not hidden. `hidden` is still scrollable by the UA, and iOS
     reveals a focused field by scrolling EVERY scrollable ancestor — including
     this one. That scrolled the whole shell (sheet + #view + tab bar) upward and
     nothing ever put it back: the sheet header ended up under the status bar with
     a dead band beneath the app. `clip` cannot be scrolled by anyone. */
  margin:0;height:100%;height:var(--vvh,100%);overflow:clip;
  position:relative; /* overlays (sheets/toasts) anchor to the shell, never to position:fixed — fixed mis-anchors on iOS standalone */
  display:flex;flex-direction:column;
  background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;
  overscroll-behavior:none;touch-action:manipulation;
}
body::before{ /* ambient glow */
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(600px 420px at 85% -5%,rgba(16,185,129,.13),transparent 65%),
    radial-gradient(500px 380px at -10% 30%,rgba(45,212,191,.07),transparent 60%);
}
#view{
  position:relative;z-index:1;flex:1;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;
  padding:calc(env(safe-area-inset-top) + 14px) 16px 46px;
}
#view > *{max-width:640px;margin-left:auto;margin-right:auto}
body.locked #view{overflow:hidden}
@media(min-width:900px){ #view{padding-top:36px} #view > *{max-width:760px} }

/* ---------- typography blocks ---------- */
.lt{margin:6px 2px 16px}
.lt h1{margin:0;font-size:30px;font-weight:800;letter-spacing:-.02em}
.lt .sub{color:var(--sub);font-size:13.5px;margin-top:2px}
.brand{display:flex;align-items:center;gap:9px;margin:2px 2px 4px}
.brand .mark{width:30px;height:30px;border-radius:9px;flex:none}
.brand b{font-size:19px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(120deg,#eafff6,#7ef0c6);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .date{margin-left:auto;color:var(--faint);font-size:12.5px}

/* ---------- cards ---------- */
.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border:1px solid var(--line2);border-radius:var(--r-lg);
  padding:16px;margin-bottom:12px;
}
.card h2{margin:0 0 12px;font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--sub)}
.card h2 .hint{float:right;font-weight:600;text-transform:none;letter-spacing:0;color:var(--faint);font-size:12px}
.rise{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- hero ---------- */
.hero{position:relative;overflow:hidden;padding:20px 18px 18px}
.hero .lbl{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sub)}
.hero .num{font-size:clamp(40px,13vw,54px);font-weight:800;letter-spacing:-.035em;line-height:1.05;
  margin:6px 0 4px;font-variant-numeric:tabular-nums}
.hero .num.pos{background:linear-gradient(120deg,#a7f3d0,#34d399 55%,#2dd4bf);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .num.neg{color:var(--neg)}
.hero .sub{color:var(--sub);font-size:13.5px}

/* ---------- stat grids ---------- */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stats.two{grid-template-columns:repeat(2,1fr)}
.stat{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line2);
  border-radius:var(--r-md);padding:12px 12px 11px;min-width:0}
.stat .k{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat .v{font-size:19px;font-weight:800;letter-spacing:-.02em;margin-top:3px;font-variant-numeric:tabular-nums;white-space:nowrap}
.stat .d{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat .v.pos{color:var(--pos)} .stat .v.neg{color:var(--neg)}

/* ---------- chart ---------- */
.chart-wrap{margin:2px -2px 0}
.chart-wrap svg{display:block;width:100%;height:auto}
.bar{transition:opacity .15s}
.bar.dim{opacity:.55}
.bar.sel{opacity:1;filter:drop-shadow(0 0 6px rgba(52,211,153,.55))}
.axm{font-size:9.5px;fill:var(--faint);font-family:inherit}
.axm.cur{fill:var(--em);font-weight:700}
.axv{font-size:9px;fill:var(--faint)}
#mdetail{margin-top:10px;padding-top:10px;border-top:1px solid var(--line2);
  font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums}
#mdetail b{color:var(--txt)}
.ghostmsg{font-size:13px;color:var(--sub);text-align:center;margin-top:8px}

/* ---------- horizontal bars ---------- */
.hrow{display:grid;grid-template-columns:1fr auto;gap:3px 12px;align-items:center;margin-bottom:11px}
.hrow:last-child{margin-bottom:2px}
.hlab{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hlab i{font-style:normal;color:var(--faint);font-weight:500;font-size:12px;margin-left:6px}
.hval{font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
.hval.pos{color:var(--pos)} .hval.neg{color:var(--neg)}
.htrack{grid-column:1/-1;height:7px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden}
.hfill{height:100%;width:0;border-radius:99px;background:var(--grad);transition:width .7s cubic-bezier(.2,.7,.3,1)}
.hfill.neg{background:linear-gradient(90deg,#fb7185,#e11d48)}
.hfill.go{width:var(--w)}

/* ---------- top flips ---------- */
.toprow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line2)}
.toprow:last-child{border-bottom:0;padding-bottom:2px}
.toprow .medal{font-size:20px;flex:none}
.toprow .n{flex:1;min-width:0;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toprow .n small{display:block;color:var(--faint);font-weight:500;font-size:11.5px}
.toprow .p{font-weight:800;color:var(--pos);font-variant-numeric:tabular-nums}

/* ---------- item lists ---------- */
.toolbar{display:flex;gap:8px;margin-bottom:12px}
.search{flex:1;position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--faint);pointer-events:none}
.search input{width:100%;height:44px;padding:0 12px 0 36px;border-radius:14px;border:1px solid var(--line2);
  background:var(--card);color:var(--txt);font-size:16px;outline:none}
.search input::placeholder{color:var(--faint)}
.search input:focus{border-color:rgba(52,211,153,.45)}
.sortbtn{height:44px;padding:0 13px;border-radius:14px;border:1px solid var(--line2);background:var(--card);
  color:var(--sub);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;white-space:nowrap}
.sumline{color:var(--sub);font-size:12.5px;margin:0 2px 10px;font-variant-numeric:tabular-nums}
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:0;cursor:pointer}
.item:active{transform:scale(.985)}
.thumb{width:54px;height:54px;border-radius:14px;flex:none;background:rgba(255,255,255,.05);
  border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.mid{flex:1;min-width:0}
.mid h3{margin:0;font-size:14.5px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mid .meta{color:var(--sub);font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-variant-numeric:tabular-nums}
.badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge{font-size:10.5px;font-weight:700;padding:2.5px 7px;border-radius:99px;
  background:rgba(255,255,255,.06);color:var(--sub);border:1px solid var(--line2)}
.badge.amber{background:rgba(251,191,36,.12);color:var(--amber);border-color:rgba(251,191,36,.25)}
.badge.green{background:rgba(52,211,153,.12);color:var(--pos);border-color:rgba(52,211,153,.25)}
/* inventory card: glance strip (In / Ask / Potential / Held) + icon sold button */
.item.inv{flex-wrap:wrap}
.soldbtn{width:38px;height:38px;border-radius:12px;background:var(--grad);color:#04241a;border:0;
  display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;
  box-shadow:0 4px 12px rgba(16,185,129,.25);transition:transform .12s}
.soldbtn:active{transform:scale(.9)}
.soldbtn svg{width:19px;height:19px}
.istats{width:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px;
  margin-top:10px;padding-top:9px;border-top:1px solid var(--line2)}
.istats span{display:block;font-size:9.5px;font-weight:750;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.istats b{font-size:13.5px;font-weight:750;font-variant-numeric:tabular-nums;white-space:nowrap}
.istats b.pos{color:var(--pos)} .istats b.neg{color:var(--neg)}
.istats i{font-style:normal;color:var(--amber)}
.pl{text-align:right;flex:none}
.pl b{display:block;font-size:15.5px;font-weight:800;font-variant-numeric:tabular-nums}
.pl.pos b{color:var(--pos)} .pl.neg b{color:var(--neg)}
.pl i{font-style:normal;font-size:11px;color:var(--faint)}
.mgroup{display:flex;align-items:baseline;gap:8px;margin:18px 2px 9px}
.mgroup:first-child{margin-top:2px}
.mgroup b{font-size:13px;font-weight:700;color:var(--txt)}
.mgroup span{font-size:12px;color:var(--sub);font-variant-numeric:tabular-nums}

/* ---------- empty states ---------- */
.empty{text-align:center;padding:46px 20px 50px;color:var(--sub)}
.empty .big{font-size:44px;margin-bottom:10px;filter:saturate(.85)}
.empty h3{margin:0 0 4px;color:var(--txt);font-size:17px;font-weight:700}
.empty p{margin:0 0 18px;font-size:13.5px;max-width:300px;margin-inline:auto}

/* ---------- buttons ---------- */
.btn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--txt);
  border-radius:var(--r-sm);padding:10px 14px;font-size:14px;font-weight:650;font-family:inherit;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;
  transition:transform .12s,opacity .15s;user-select:none;-webkit-user-select:none}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--grad);border-color:transparent;color:#04241a;font-weight:750;
  box-shadow:0 6px 18px rgba(16,185,129,.25)}
.btn-ghost{background:transparent}
.btn-danger{background:rgba(251,113,133,.1);border-color:rgba(251,113,133,.3);color:var(--neg)}
.btn-danger.armed{background:#e11d48;border-color:#e11d48;color:#fff}
.btn-big{width:100%;height:52px;border-radius:15px;font-size:16px}
.btn-mini{padding:7px 12px;font-size:12.5px;border-radius:10px;flex:none}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btnrow .full{grid-column:1/-1}

/* ---------- tab bar ---------- */
#tabbar{
  position:relative;z-index:40;flex:none;
  display:grid;grid-template-columns:1fr 1fr 76px 1fr 1fr;align-items:stretch;
  height:calc(var(--tabh) + env(safe-area-inset-bottom));
  padding:0 6px env(safe-area-inset-bottom);
  background:rgba(10,17,14,.86);
  -webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);
  border-top:1px solid rgba(255,255,255,.07);
}
@supports not (backdrop-filter:blur(1px)){ #tabbar{background:#0c1310} }
.tab{appearance:none;border:0;background:none;color:var(--faint);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;font-family:inherit;font-size:10px;font-weight:650;
  letter-spacing:.02em;cursor:pointer;padding-top:6px}
.tab svg{width:23px;height:23px}
.tab.on{color:var(--em)}
#tabbar .tab[data-view="settings"]{display:none} /* mobile: settings lives behind the gear */
.gearbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line2);background:rgba(255,255,255,.05);
  color:var(--sub);display:inline-flex;align-items:center;justify-content:center;flex:none;cursor:pointer;padding:0}
.gearbtn svg{width:19px;height:19px}
.gearbtn:active{transform:scale(.93)}

/* portrait-only on phones: iOS ignores manifest orientation, so landscape
   gets a full-screen "rotate back" guard instead of a broken layout */
#rotate-lock{display:none}
@media (orientation:landscape) and (pointer:coarse) and (max-width:999px){
  #rotate-lock{display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg);
    flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:20px}
  #rotate-lock .big{font-size:40px}
  #rotate-lock b{font-size:18px;font-weight:800}
  #rotate-lock small{color:var(--sub);font-size:13.5px}
}
.fabwrap{position:relative;border:0;background:none;cursor:pointer}
.fab{position:absolute;left:50%;top:-16px;transform:translateX(-50%);
  width:58px;height:58px;border-radius:50%;background:var(--grad);
  display:flex;align-items:center;justify-content:center;color:#04241a;
  box-shadow:0 8px 22px rgba(16,185,129,.4),inset 0 1px 0 rgba(255,255,255,.35);
  transition:transform .13s}
.fabwrap:active .fab{transform:translateX(-50%) scale(.92)}
.fab svg{width:26px;height:26px}
.fab-label{display:none}

/* ---------- sheets ---------- */
#sheet-root{display:contents} /* pass-through: .sheet-wrap anchors to BODY */
/* Overlays live INSIDE the body shell (absolute, not fixed): body is the one
   box measured to the real visible screen, while fixed layers mis-anchor on
   iOS standalone / scaled webviews. */
.sheet-wrap{position:absolute;inset:0;z-index:60}
.backdrop{position:absolute;inset:-35% 0;background:rgba(2,6,5,.6);opacity:0;transition:opacity .25s;
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)} /* overdrawn past the shell so iOS keyboard pans can't expose an undimmed strip */
/* The panel's geometry is KEYBOARD-INDEPENDENT on purpose. It used to ride the
   keyboard (bottom:var(--kb) + max-height minus --kb), which meant any bad --kb
   reading crushed the panel and left a dead gap under it. Now it is pinned to
   the bottom of the shell and capped by the shell itself (100% = the wrap =
   body), so a wrong --kb can cost at most some extra scroll padding — never the
   layout. The keyboard is handled once, inside .sheet-body. */
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:640px;margin:0 auto;
  background:#101a16;border:1px solid var(--line2);border-bottom:0;
  border-radius:24px 24px 0 0;max-height:calc(100% - env(safe-area-inset-top) - 8px);
  display:flex;flex-direction:column;
  overflow:hidden; /* the panel CLIPS its scroller — content can never paint outside the card */
  transform:translateY(103%);
  transition:transform .3s cubic-bezier(.2,.75,.25,1);
  box-shadow:0 -12px 44px rgba(0,0,0,.5)}
.sheet-wrap.open .backdrop{opacity:1}
.sheet-wrap.open .sheet{transform:none}
.grab{width:38px;height:4.5px;border-radius:99px;background:rgba(255,255,255,.14);margin:9px auto 0;flex:none}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 4px;flex:none}
.sheet-head h2{margin:0;font-size:19px;font-weight:800;letter-spacing:-.01em}
.sheet-head .x{width:32px;height:32px;border-radius:50%;border:0;background:rgba(255,255,255,.07);
  color:var(--sub);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* flex:1 1 auto + min-height:0 = the scroller is the ONLY thing that resizes;
   it can always shrink to the panel and never pushes content out of the card.
   (-webkit-overflow-scrolling:touch is deliberately gone — deprecated since
   iOS 13 and its compositing layer is a known cause of exactly that escape.) */
.sheet-body{flex:1 1 auto;min-height:0;overflow-y:auto;
  padding:10px 18px calc(20px + env(safe-area-inset-bottom) + var(--kb,0px));
  scroll-padding:70px 0 calc(24px + var(--kb,0px))}
/* --kb bottom padding = real scroll headroom, and scroll-padding tells WebKit's
   OWN focus-scroll that the bottom --kb isn't visible — so it lands the field
   above the keyboard instead of panning the whole page to reach it. */

/* ---------- forms ---------- */
.sec{display:block;font-size:11px;font-weight:750;text-transform:uppercase;letter-spacing:.08em;
  color:var(--sub);margin:15px 2px 7px}
.sec:first-child{margin-top:4px}
.in{width:100%;height:48px;padding:0 13px;border-radius:13px;border:1px solid var(--line2);
  background:rgba(255,255,255,.05);color:var(--txt);font-size:16px;font-family:inherit;outline:none}
.in:focus{border-color:rgba(52,211,153,.5);background:rgba(52,211,153,.05)}
.in.err{border-color:rgba(251,113,133,.6)}
textarea.in{height:auto;min-height:74px;padding:11px 13px;resize:vertical;line-height:1.4}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.money{position:relative}
.money::before{content:"$";position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--faint);font-size:16px;font-weight:600;pointer-events:none}
.money .in{padding-left:28px}
input[type=date].in{appearance:none;-webkit-appearance:none;min-width:0}
input[type=date].in::-webkit-calendar-picker-indicator{filter:invert(.6);opacity:.8}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--sub);
  border-radius:99px;padding:8.5px 13px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:transform .1s}
.chip:active{transform:scale(.95)}
.chip.sel{background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.55);color:var(--em)}
details.more{margin-top:15px;border-top:1px solid var(--line2);padding-top:4px}
details.more summary{list-style:none;cursor:pointer;color:var(--sub);font-size:13px;font-weight:650;
  padding:8px 2px;display:flex;align-items:center;gap:6px}
details.more summary::-webkit-details-marker{display:none}
details.more summary::after{content:"▾";font-size:11px;transition:transform .2s}
details.more[open] summary::after{transform:rotate(180deg)}
.photo-pick{display:flex;align-items:center;gap:12px;margin-bottom:2px}
.photo-pick .pv{width:64px;height:64px;border-radius:15px;background:rgba(255,255,255,.05);
  border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;
  font-size:22px;color:var(--faint);overflow:hidden;flex:none}
.photo-pick .pv img{width:100%;height:100%;object-fit:cover}
.preview-line{margin-top:13px;padding:11px 13px;border-radius:13px;background:rgba(52,211,153,.07);
  border:1px solid rgba(52,211,153,.18);font-size:13.5px;color:var(--sub);font-variant-numeric:tabular-nums}
.preview-line b.pos{color:var(--pos)} .preview-line b.neg{color:var(--neg)}
.minirow{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;
  background:rgba(255,255,255,.04);border:1px solid var(--line2);margin-bottom:4px}
.minirow .thumb{width:42px;height:42px;border-radius:11px;font-size:19px}
.minirow b{font-size:14px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.minirow small{color:var(--sub);font-size:12px}

/* ---------- detail sheet ---------- */
.dphoto{width:100%;height:190px;border-radius:16px;object-fit:cover;margin-bottom:13px;border:1px solid var(--line2)}
.dhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.dhead h3{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em;flex:1}
.pstat{flex:none;font-size:11px;font-weight:750;padding:4px 10px;border-radius:99px;margin-top:3px}
.pstat.inv{background:rgba(96,165,250,.13);color:#7ab8ff}
.pstat.sold{background:rgba(52,211,153,.13);color:var(--pos)}
.dprofit{font-size:26px;font-weight:800;margin:2px 0 10px;font-variant-numeric:tabular-nums}
.dprofit.pos{color:var(--pos)} .dprofit.neg{color:var(--neg)}
.dprofit small{font-size:13px;color:var(--sub);font-weight:600;margin-left:7px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0 2px}
.kv .cell{background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:13px;padding:9px 11px}
.kv .cell span{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.kv .cell b{font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums}
.dnotes{margin-top:12px;padding:11px 13px;border-radius:13px;background:rgba(255,255,255,.04);
  border:1px solid var(--line2);font-size:13.5px;color:var(--sub);white-space:pre-wrap;word-break:break-word}

/* ---------- settings ---------- */
.srow{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line2)}
.srow:last-child{border-bottom:0}
.srow .ic{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.06);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:16px}
.srow .tx{flex:1;min-width:0}
.srow .tx b{display:block;font-size:14px;font-weight:650}
.srow .tx small{color:var(--faint);font-size:12px}
.foot{text-align:center;color:var(--faint);font-size:12px;margin-top:22px;line-height:1.7}
.foot b{color:var(--sub)}

/* ---------- toasts ---------- */
#toast-root{position:absolute;top:calc(env(safe-area-inset-top) + 10px);left:0;right:0;z-index:80;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:#152019;border:1px solid var(--line);color:var(--txt);font-size:13.5px;font-weight:600;
  padding:11px 18px;border-radius:99px;box-shadow:0 10px 30px rgba(0,0,0,.45);
  animation:tin .3s cubic-bezier(.2,.8,.3,1) both;max-width:88vw;text-align:center}
.toast.good{border-color:rgba(52,211,153,.4)}
.toast.warn{border-color:rgba(251,191,36,.45)}
.toast.bad{border-color:rgba(251,113,133,.5)}
.toast.out{animation:tout .25s ease-in both}
@keyframes tin{from{opacity:0;transform:translateY(-14px) scale(.95)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(-10px) scale(.96)}}

/* ---------- leaderboard ---------- */
.lb-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line2)}
.lb-row:first-of-type{padding-top:2px}
.lb-row:last-child{border-bottom:0;padding-bottom:2px}
.lb-rank{width:24px;display:flex;justify-content:center;flex:none}
.rankb{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:800;flex:none;font-variant-numeric:tabular-nums;letter-spacing:0}
.rankb.r1{background:linear-gradient(135deg,#34d399,#0d9488);color:#04241a;box-shadow:0 0 10px rgba(52,211,153,.35)}
.rankb.r2{background:linear-gradient(135deg,#e2e8f0,#94a3b8);color:#0f172a}
.rankb.r3{background:linear-gradient(135deg,#fbbf24,#d97706);color:#231303}
.rankb.rn{background:rgba(255,255,255,.07);color:var(--sub)}
.avatar{width:36px;height:36px;border-radius:50%;flex:none;display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#04241a;letter-spacing:.02em}
.avatar.ghost{background:rgba(255,255,255,.08);color:var(--faint)}
.lb-mid{flex:1;min-width:0}
.lb-mid b{display:block;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-mid small{color:var(--faint);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.lb-track{height:5px;border-radius:99px;background:rgba(255,255,255,.05);margin-top:6px;overflow:hidden}
.lb-p{font-weight:800;font-variant-numeric:tabular-nums;flex:none;font-size:15px}
.lb-p.pos{color:var(--pos)} .lb-p.neg{color:var(--neg)}

/* ---------- sync pill ---------- */
.sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--faint);
  border:1px solid var(--line2);background:rgba(255,255,255,.04);border-radius:99px;padding:4px 10px;cursor:pointer;
  font-family:inherit;margin-left:2px}
.sync-pill .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:none}
.sync-pill.ok{color:var(--sub)} .sync-pill.ok .dot{background:var(--pos)}
.sync-pill.err .dot{background:var(--neg)}
.sync-pill.syncing .dot{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}

/* ---------- inline "new person" chip input ---------- */
.chip-in{height:37px;border-radius:99px;border:1px solid rgba(52,211,153,.55);background:rgba(52,211,153,.07);
  color:var(--txt);font-size:16px;font-family:inherit;padding:0 13px;outline:none;width:150px}

/* ---------- taxes ---------- */
.trow{display:flex;align-items:center;gap:10px;padding:8.5px 0;border-bottom:1px solid var(--line2)}
.trow:last-child{border-bottom:0}
.trow .n{flex:1;min-width:0;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow .n small{display:block;color:var(--faint);font-weight:500;font-size:11px}
.trow .tv{font-weight:750;font-variant-numeric:tabular-nums;font-size:13.5px;flex:none}
.trow .tv.save{color:var(--pos)}
.kv .cell.hl{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.35)}
.taxnote{margin-top:13px;font-size:12px;color:var(--faint);line-height:1.6}
.taxnote b{color:var(--sub)}

.hidden{display:none!important}

/* ---------- desktop web layout (≥1000px) ----------
   Same DOM, different shell: the bottom tab bar becomes a left sidebar,
   content lays out on a 12-col grid, lists go two-up, and bottom sheets
   become centered modals. Phone layout is untouched. */
@media(min-width:1000px){
  body{flex-direction:row}

  #tabbar{
    order:-1;display:flex;flex-direction:column;align-items:stretch;gap:5px;
    width:238px;flex:none;height:auto;
    padding:20px 14px;border-top:0;border-right:1px solid rgba(255,255,255,.07);
    background:rgba(12,19,16,.55);
  }
  .tab{flex-direction:row;justify-content:flex-start;gap:12px;padding:11px 13px;border-radius:12px;color:var(--sub)}
  .tab span{font-size:14px;font-weight:650}
  .tab svg{width:20px;height:20px}
  .tab:hover{background:rgba(255,255,255,.05)}
  .tab.on{background:rgba(52,211,153,.1);color:var(--em)}
  #tabbar .tab[data-view="settings"]{display:flex} /* web: settings back in the sidebar */
  .gearbtn{display:none}
  .fabwrap{order:-1;position:static;margin:0 0 14px;padding:0}
  .fab{position:static;transform:none;width:100%;height:46px;border-radius:13px;gap:9px;
    font-size:14.5px;font-weight:750}
  .fabwrap:active .fab{transform:scale(.97)}
  .fab svg{width:20px;height:20px}
  .fab-label{display:inline}

  #view{
    display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px 16px;
    align-content:start;align-items:start;
    padding:36px max(40px,calc((100% - 1160px)/2)) 64px;
  }
  #view > *{grid-column:1/-1;max-width:none;margin-left:0;margin-right:0}
  #view > .card{grid-column:span 6;margin-bottom:0}
  #view > .card.hero{grid-column:1/-1}
  .stats{margin-bottom:0}
  .toolbar{max-width:560px}

  .list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .list .mgroup{grid-column:1/-1}
  .list .empty{grid-column:1/-1}
  .item:hover{border-color:rgba(255,255,255,.14);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035))}

  #view::-webkit-scrollbar{width:10px}
  #view::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px;border:3px solid var(--bg)}
  #view::-webkit-scrollbar-track{background:transparent}

  .sheet{
    left:50%;right:auto;bottom:auto;top:50%;width:540px;max-width:94vw;
    max-height:min(86vh,780px);border-radius:22px;border-bottom:1px solid var(--line2);
    transform:translate(-50%,-46%) scale(.97);opacity:0;
    transition:transform .22s cubic-bezier(.2,.75,.25,1),opacity .18s;
  }
  .sheet-wrap.open .sheet{transform:translate(-50%,-50%) scale(1);opacity:1}
  .grab{display:none}
}

<div id="vv-probe" style="position:fixed;inset:0;visibility:hidden;pointer-events:none;z-index:-1"></div>
<script>
/* Size the app shell to the TRUE bottom of the glass. Every iOS standalone
   number lies a little: dvh reserves phantom Safari chrome, and
   innerHeight/visualViewport under-report by status-bar/home-indicator
   slices. So: take the tallest honest measurement (a fixed inset-0 probe =
   where fixed elements really bottom out, plus the JS viewport numbers),
   and in installed-app mode snap to the physical screen height when the JS
   numbers fall only a hair short of it. Re-measures on rotate/resize. */
(function () {
  var probe = document.getElementById('vv-probe');
  var lastKb = 0, lastH = 0, reserveUntil = 0;
  // stableH = the shell height measured with NO keyboard in play. Some browsers
  // shrink the layout viewport when the keyboard opens; if we wrote that into
  // --vvh the whole app would shrink to the space above the keyboard and stay
  // there (the black band under the page). So a keyboard-sized DROP while a
  // field is focused is refused — growth is always allowed.
  var stableH = 0;
  function fieldFocused() {
    var ae = document.activeElement;
    return !!ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable);
  }
  // Visible band in LAYOUT coordinates. getBoundingClientRect() is layout-
  // relative, so when iOS pans the page (visualViewport.offsetTop > 0) the
  // visible strip starts at offsetTop — comparing against vv.height alone
  // misplaces the field by exactly the pan distance.
  function visBand() {
    var vvp = window.visualViewport;
    if (!vvp) return { top: 0, bottom: window.innerHeight };
    return { top: vvp.offsetTop, bottom: vvp.offsetTop + vvp.height };
  }
  // Remembered keyboard height for this device — lets us reserve the space
  // BEFORE iOS reacts to a focus, which is the whole trick: once the field
  // is already comfortably placed, WebKit has nothing to pan for.
  var kbEst = parseInt(localStorage.getItem('flips.kbh') || '300', 10) || 300;
  function setKb(px) {
    if (px === lastKb) return;
    lastKb = px;
    document.documentElement.style.setProperty('--kb', px + 'px');
  }
  // One-shot, idempotent reveal: scroll the sheet's own scroller by exactly
  // the overlap. Once the field is visible it does NOTHING — so it can never
  // feed back into scroll events and oscillate (the "jumps up and down" bug).
  function revealFocused() {
    var ae = document.activeElement;
    if (!ae || (ae.tagName !== 'INPUT' && ae.tagName !== 'TEXTAREA')) return;
    var sb = ae.closest ? ae.closest('.sheet-body') : null;
    if (!sb) return;
    var band = visBand();
    var r = ae.getBoundingClientRect();
    if (r.bottom > band.bottom - 14) sb.scrollTop += (r.bottom - (band.bottom - 14));
    else if (r.top < band.top + 58) sb.scrollTop -= (band.top + 58 - r.top);
  }
  function fit() {
    var vvp = window.visualViewport;
    var vv = (vvp && vvp.height) || 0;
    var ih = window.innerHeight || 0;
    var pr = probe ? probe.getBoundingClientRect().height : 0;
    var standalone = (window.matchMedia && matchMedia('(display-mode: standalone)').matches) ||
      window.navigator.standalone === true;
    var h;
    if (standalone) {
      h = Math.max(pr, ih, vv);
      var portrait = !window.matchMedia || matchMedia('(orientation: portrait)').matches;
      var s = portrait ? Math.max(screen.height || 0, screen.width || 0)
                       : Math.min(screen.height || 0, screen.width || 0);
      // Installed app = full-screen webview. If the JS viewport is short of the
      // physical screen by less than a chrome-slice, the screen is the truth.
      // (Big differences mean split view / keyboard — keep the measurement.)
      if (s > h && s - h <= 140) h = s;
    } else {
      h = vv || ih || pr;
    }
    if (h && h > 250) {
      h = Math.round(h);
      // Refuse a keyboard-sized shrink while typing — that's the browser
      // resizing the layout viewport, not the screen getting shorter.
      if (stableH && h < stableH - 60 && (fieldFocused() || Date.now() < reserveUntil)) {
        lastH = stableH; // keep measuring the keyboard against the real screen
      } else {
        stableH = lastH = h;
        document.documentElement.style.setProperty('--vvh', h + 'px');
      }
    }

    // Measured keyboard overlap (floor 140px: real keyboards are 216px+,
    // resting viewport lies stay under ~100px). offsetTop matters: if iOS has
    // panned the page, the covered strip is what's left below the panned
    // visual viewport, not below its bare height. A real measurement refines
    // the pre-reserved estimate; a zero reading is IGNORED while a reserve
    // is active so the keyboard's animation window can't flicker the padding.
    var kb = 0;
    if (vvp && lastH) kb = Math.max(0, Math.round(lastH - vv - (vvp.offsetTop || 0)));
    if (kb < 140) kb = 0;
    if (kb >= 140) {
      kbEst = kb;
      try { localStorage.setItem('flips.kbh', String(kb)); } catch (e) {}
      setKb(kb);
      if (vvp && vvp.offsetTop > 0) window.scrollTo(0, 0); // last-resort un-pan
      setTimeout(revealFocused, 60);
    } else if (Date.now() > reserveUntil) {
      setKb(0);
    }
  }
  fit();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', fit);
  }
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', function () {
    stableH = 0; // the screen really did change shape — re-establish the baseline
    setTimeout(fit, 250);
  });
  window.addEventListener('pageshow', fit);
  window.addEventListener('focusin', function (e) {
    var t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') &&
        t.closest && t.closest('.sheet-body') && 'ontouchstart' in window) {
      // Reserve the keyboard's space BEFORE WebKit computes visibility:
      // lift the sheet + pad the form using the remembered height, and put
      // the field in position ourselves. No pan, no fight, no jump.
      reserveUntil = Date.now() + 1200;
      setKb(kbEst);
      setTimeout(revealFocused, 30);
    } else {
      setTimeout(fit, 120);
    }
  });
  window.addEventListener('focusout', function () {
    reserveUntil = 0;
    // Undo any pan iOS applied while the field was focused, then re-measure
    // once the keyboard has finished sliding away.
    unpan();
    setTimeout(function () { unpan(); fit(); }, 250);
    setTimeout(function () { unpan(); fit(); }, 600);
  });
  // The document must sit at scroll 0 — the shell IS the screen. iOS still pans
  // it to reveal a focused field (overflow:clip on the root doesn't stop that),
  // and a pan left in place after the keyboard closes is what strands the whole
  // app shifted up with its header under the status bar. So snap back, but only
  // at REST: never mid-type, or we'd be tugging against WebKit every frame while
  // it tries to place the field (that fight is the old jump-loop, LM-51).
  function unpan() {
    if (window.scrollY || window.pageYOffset) window.scrollTo(0, 0);
    // The BODY is the one that actually gets scrolled by iOS's field reveal —
    // window.scrollY reads 0 the whole time, which is why this hid for so long.
    if (document.body.scrollTop) document.body.scrollTop = 0;
    if (document.documentElement.scrollTop) document.documentElement.scrollTop = 0;
  }
  document.addEventListener('scroll', function (e) {
    var t = e.target;
    if (t !== document && t !== document.body && t !== document.documentElement) return; // ignore #view / .sheet-body
    if (fieldFocused() || Date.now() < reserveUntil) return;
    unpan();
  }, true);

  setTimeout(fit, 60); setTimeout(fit, 400); // iOS settles the viewport late on cold launch

  // hard orientation lock where the platform allows it (Android standalone);
  // iOS rejects — the CSS #rotate-lock guard covers it there
  var standaloneNow = (window.matchMedia && matchMedia('(display-mode: standalone)').matches) ||
    window.navigator.standalone === true;
  if (standaloneNow && screen.orientation && screen.orientation.lock) {
    try { screen.orientation.lock('portrait').catch(function () {}); } catch (e) {}
  }

  // Real-app feel: no pinch zoom, no double-tap zoom (viewport meta +
  // touch-action:manipulation cover most of it; these catch iOS's extras).
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
  document.addEventListener('touchmove', function (e) {
    if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
  }, { passive: false });
  if ('ontouchstart' in window) {
    document.addEventListener('dblclick', function (e) { e.preventDefault(); });
  }
})();
</script>
